<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>春曉 - 博物館 AR 互動沙盤</title>
    
    <!-- 使用最穩定的 1.4.2 版本 -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        /* 1. 視窗鎖死：強制禁止任何方向的滑動，寬高鎖死 100% */
        html, body { 
            margin: 0; padding: 0; 
            width: 100vw !important; height: 100vh !important; 
            overflow: hidden !important; 
            position: fixed !important; /* 徹底封死右滑 */
            background: transparent !important;
        }
        
        /* 2. 捕獲並降伏 MindAR 自動生成的 video 標籤，強行逼它去最底層鋪滿 */
        video {
            position: fixed !important;
            top: 0 !important; left: 0 !important;
            width: 100vw !important; height: 100vh !important;
            object-fit: cover !important;
            z-index: -1 !important; /* 乖乖待在最底層 */
        }

        /* 3. A-Frame 3D 畫布層：絕對定位疊加在影片上方，背景透明 */
        .a-canvas {
            position: fixed !important;
            top: 0 !important; left: 0 !important;
            width: 100vw !important; height: 100vh !important;
            background-color: transparent !important;
            z-index: 1 !important; /* 第二層 */
        }

        /* 4. 暴力清除所有 A-Frame 原生 UI，包括那個頑固的 VR 按鈕 */
        .a-enter-vr, .a-enter-ar, .a-enter-vr-button, .a-enter-ar-button, .a-orientation-modal, .a-loader-title {
            display: none !important;
            visibility: hidden !important;
            opacity: 0 !important;
            pointer-events: none !important;
        }

        /* 5. UI 引導層：懸浮在最頂層 */
        #scanning-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 10; /* 最頂層 */
            pointer-events: none;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }

        /* 中式古典掃描框 */
        .scan-reticle {
            width: 240px; height: 240px;
            border: 2px dashed rgba(255, 255, 255, 0.4);
            position: relative; margin-bottom: 40px;
        }
        .scan-reticle::before, .scan-reticle::after {
            content: ''; position: absolute; width: 24px; height: 24px;
        }
        .scan-reticle::before {
            top: -2px; left: -2px; border-top: 5px solid #ccaf7d; border-left: 5px solid #ccaf7d;
        }
        .scan-reticle::after {
            bottom: -2px; right: -2px; border-bottom: 5px solid #ccaf7d; border-right: 5px solid #ccaf7d;
        }

        /* 底部膠囊提示語 */
        .scan-hint-capsule {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #111; padding: 14px 32px;
            border-radius: 30px; font-family: sans-serif;
            font-size: 15px; font-weight: bold; letter-spacing: 0.1em;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        
        /* 宣紙詩句卷軸 UI */
        .poem-overlay {
            position: fixed; right: 6%; top: 12%;
            background: rgba(247, 244, 232, 0.96); 
            border-left: 3px solid #ccaf7d;
            padding: 35px 20px; border-radius: 4px;
            font-family: "STKaiti", "KaiTi", serif;
            font-size: 26px; font-weight: bold; color: #111;
            writing-mode: vertical-rl;
            letter-spacing: 0.3em; line-height: 1.5;
            
            opacity: 0; 
            visibility: hidden; 
            transform: translateX(30px);
            
            transition: opacity 1s ease, transform 1s cubic-bezier(0.16, 1, 0.3, 1), visibility 1s;
            z-index: 11; /* 確保在畫布之上 */
            box-shadow: -8px 12px 35px rgba(0,0,0,0.3);
        }
        .poem-overlay.active {
            opacity: 1;
            visibility: visible;
            transform: translateX(0);
        }
    </style>
</head>

<body>

    <!-- 懸浮引導層 -->
    <div id="scanning-overlay">
        <div class="scan-reticle"></div>
        <div class="scan-hint-capsule">請將鏡頭對準實體磁吸沙盤</div>
    </div>
    
    <!-- 宣紙卷軸 -->
    <div id="poem-box" class="poem-overlay">處處聞啼鳥。</div>

    <!-- AR 舞台 -->
    <a-scene 
        mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.2/examples/image-tracking/assets/card-example/card.mind; uiScanning: #scanning-overlay;" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false"
        embedded
        renderer="transparent: true, alpha: true"
        style="position: absolute; width: 100vw; height: 100vh; top: 0; left: 0; z-index: 2;">
        
        <a-assets>
            <img id="bird-asset" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='10' y='80' font-size='70'>🐦</text></svg>">
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- 追蹤目標 -->
        <a-entity mindar-image-target="targetIndex: 0" id="target-bird">
            <a-image src="#bird-asset" position="0 0 0" width="0.55" height="0.55" 
                     animation="property: position; to: 0 0.25 0; dur: 2000; easing: easeInOutSine; loop: true; dir: alternate;">
            </a-image>
        </a-entity>
    </a-scene>

    <script>
        const targetBird = document.querySelector('#target-bird');
        const poemBox = document.querySelector('#poem-box');

        targetBird.addEventListener("targetFound", () => {
            poemBox.classList.add('active');
        });

        targetBird.addEventListener("targetLost", () => {
            poemBox.classList.remove('active');
        });
    </script>
</body>
</html>
