<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>春晓 AR - A-Frame 稳定测试版</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background: #222; }
        
        .poem-overlay {
            position: absolute; right: 5%; top: 10%;
            font-family: "STKaiti", "KaiTi", serif;
            font-size: 28px; font-weight: bold; color: #fff;
            writing-mode: vertical-rl;
            letter-spacing: 0.2em; opacity: 0;
            transition: opacity 1.5s ease; z-index: 100;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>
    <div id="poem-box" class="poem-overlay">春眠不觉晓，<br>处处闻啼鸟。</div>

    <a-scene mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <img id="bird-img" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='10' y='80' font-size='70'>🐦</text></svg>">
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" id="target-bird">
            
            <a-image src="#bird-img" position="0 0 0" width="0.5" height="0.5" 
                     animation="property: position; to: 0 0.5 0; dur: 1500; easing: easeInOutSine; loop: true; dir: alternate;">
            </a-image>

        </a-entity>
    </a-scene>

    <script>
        // 用极简的代码控制 UI 的浮现
        const targetBird = document.querySelector('#target-bird');
        const poemBox = document.querySelector('#poem-box');

        targetBird.addEventListener("targetFound", () => {
            poemBox.style.opacity = "1";
        });

        targetBird.addEventListener("targetLost", () => {
            poemBox.style.opacity = "0";
        });
    </script>
</body>
</html>
