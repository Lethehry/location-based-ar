<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>春晓 AR - 唐诗画谱</title>
    
    <!-- 1. 彻底删掉 TensorFlow，引入 MindAR 纯编译版库 -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image.prod.js"></script>
    
    <!-- 保留你原有的样式表 -->
    <link rel="stylesheet" type="text/css" href="./style.css"/>
    
    <style>
        /* 新中古风 UI 强化：古风字体的诗句显示盒 */
        .poem-overlay {
            position: absolute; right: 5%; top: 10%;
            font-family: "STKaiti", "KaiTi", serif;
            font-size: 28px; font-weight: bold; color: #222;
            writing-mode: vertical-rl; /* 垂直排版 */
            letter-spacing: 0.2em; opacity: 0;
            transition: opacity 1.5s ease; z-index: 100;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }
    </style>
</head>

<body style='margin: 0; overflow: hidden; background: #000;'>

    <!-- 2. 古风诗句浮现层 -->
    <div id="poem-box" class="poem-overlay"></div>

    <!-- 保留你原有的 webcam-container 和 DOM 结构 -->
    <div id="webcam-container" style="position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:1;">
        <!-- 这个 video 将用来承载真实的摄像头画面 -->
        <video id="overlay-video" style="
            position:absolute;
            top:0; left:0;
            width:100%;
            height:100%;
            object-fit: cover;
            z-index:10;
        " autoplay loop muted playsinline></video>
        
        <!-- 这个 canvas 将用来绘制精准叠加在磁吸玩具上方的 2D 水墨动画 -->
        <canvas id="overlay-canvas" style="position:absolute;top:0;left:0;width:100%;height:100%;z-index:20;pointer-events:none;"></canvas>
    </div>

    <!-- 3. 旧的红色按钮可以保留作为“清空重置”或“盖章”按钮，不再用于拍照识别 -->
    <button id="recognize-btn" onclick="onResetClick()" style="
        position:absolute;
        bottom:80px; left:50%; transform:translateX(-50%);
        z-index:30; width:64px; height:64px; border-radius:50%;
        border:2px solid rgba(255,255,255,0.7); background:transparent;
        display:flex; align-items:center; justify-content:center; cursor:pointer;
    ">
        <span style="display:block; width:28px; height:28px; border-radius:50%; background:#e53935;"></span>
    </button>

    <!-- 4. 引入你重写后的逻辑控制脚本 -->
    <script src="./script.js"></script>
</body>
</html>
